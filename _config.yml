# Site
title: AuroraKairos Blog
subtitle: 技术分享与生活记录
description: 
author: AuroraKairos
language: zh-CN
timezone: Asia/Shanghai

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://localhost:4000
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - '**/*.ejs'
  - '**/*.html'

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home setting
home_archive_path: archives
tagcloud_path: tags
categories_path: categories
sequence:
  enable: true
  repo: AuroraKairos/blog
  label: "Loading..."

# Category & Tags
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format through the theme configuration.
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## Argument format can be seen in https://momentjs.com/
# date_format: MMMM YYYY
# time_format: HH:mm

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include/Exclude
include:
exclude:
ignore:

# Metadata
meta:
  viewport: width=device-width, initial-scale=1.0, maximum-scale=5.0
  format-detection: telephone=no
  referrer: no-referrer

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: anzhiyu

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repo: git@github.com:AuroraKairos/blog.git
  branch: gh-pages
  message: "Site updated: {{now('YYYY-MM-DD HH:mm:ss')}}"

# sitemap
sitemap:
  path: sitemap.xml

# feed
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 500
  content_limit_delim: '<!-- more -->'
  order_by: -date
  tag_dir: tag
  tag_format: :tag/

# anZhiYu
anzhiyu_search:
  enable: true
  path: search.xml
  field: post
  content: true

# Analytics
baidu_analytics:
google_analytics:

# Comment
gitalk:
  enable: false
  owner: AuroraKairos
  repo: AuroraKairos.github.io
  clientID: 
  clientSecret: 
  admin: AuroraKairos
  language: zh-CN
  ping_lannuage: zh-CN
  perPage: 10
  pagerDirection: last
  distractionFreeMode: false
  autoCheck: true
  theme:
    color: ""
    lastWord: ""
  noComment: ""
  loadError: ""
  posterAvatar: ""

# Other
jsonContent:
  dateFormat: HH:mm:ss
  tags: true
  archives: false
  ignore:
    - 404.html
    - favicon.ico
    - sitemap.xml
    - robots.txt